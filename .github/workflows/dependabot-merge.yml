name: Dependabot Auto-Merge

# Hem yeni PR'larda tetiklenir hem de manuel çalıştırma butonu ekler
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch: 

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    # Manuel çalıştırıldığında veya PR'ı açan dependabot olduğunda çalışır
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      # Sadece PR tetiklemesinde meta verileri getirir
      - name: Dependabot metadata
        if: github.event_name != 'workflow_dispatch'
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # AÇIK OLAN TÜM DEPENDABOT PR'LARINI BULUR VE MERGE EDER
      - name: Approve and Enable Auto-Merge
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manuel tetikleme: Tüm açık Dependabot PR'ları işleniyor..."
            PR_URLS=$(gh pr list --author "app/dependabot" --json url --jq '.[].url')
            for PR_URL in $PR_URLS; do
              echo "İşleniyor: $PR_URL"
              gh pr review --approve "$PR_URL"
              gh pr merge --auto --merge "$PR_URL"
            done
          else
            echo "PR Tetiklemesi: Tekil PR işleniyor..."
            gh pr review --approve "$PR_URL"
            gh pr merge --auto --merge "$PR_URL"
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
